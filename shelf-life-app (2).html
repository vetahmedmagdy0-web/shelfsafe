<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShelfSafe — دليل صلاحية الأغذية</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Cairo:wght@300;400;500;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5F0E8;--ink:#1A1612;--rust:#C4440A;--amber:#E8A020;--sage:#4A7C59;--muted:#8A8070;--border:#D8D0C0;--card:#FFFFFF;--shadow:0 2px 20px rgba(26,22,18,0.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo','DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
body.ltr{font-family:'DM Sans','Cairo',sans-serif;direction:ltr;}
header{background:var(--ink);color:var(--cream);padding:20px 36px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;}
.h-title{font-family:'Playfair Display','Cairo',serif;font-size:1.7rem;font-weight:900;}
.h-badge{background:var(--rust);color:#fff;font-family:'DM Mono',monospace;font-size:.6rem;padding:3px 9px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;}
.lang-btn{margin-inline-start:auto;background:rgba(245,240,232,.12);border:1.5px solid rgba(245,240,232,.25);color:var(--cream);padding:7px 18px;border-radius:30px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:background .2s;}
.lang-btn:hover{background:rgba(245,240,232,.22);}
.top-tabs{background:var(--ink);display:flex;padding:0 36px;border-top:1px solid rgba(245,240,232,.1);}
.top-tab{padding:12px 20px;cursor:pointer;font-size:.82rem;font-weight:600;background:transparent;border:none;color:rgba(245,240,232,.42);font-family:inherit;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.top-tab.active{color:var(--cream);border-bottom-color:var(--rust);}
.top-tab:hover:not(.active){color:rgba(245,240,232,.72);}
main{max-width:920px;margin:0 auto;padding:40px 22px 80px;}
.panel{display:none;animation:up .28s ease;}
.panel.active{display:block;}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
/* search */
.sw{position:relative;margin-bottom:26px;}
.sw input{width:100%;padding:15px 50px 15px 18px;font-size:1rem;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-family:inherit;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
body.ltr .sw input{padding:15px 18px 15px 50px;}
.sw input:focus{border-color:var(--rust);box-shadow:0 0 0 3px rgba(196,68,10,.08);}
.sw-icon{position:absolute;inset-inline-end:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--muted);pointer-events:none;}
.sugg{position:absolute;width:100%;background:var(--card);border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;z-index:100;max-height:260px;overflow-y:auto;box-shadow:var(--shadow);}
.sugg-item{padding:11px 16px;cursor:pointer;font-size:.88rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);transition:background .12s;gap:8px;}
.sugg-item:last-child{border-bottom:none;}
.sugg-item:hover,.sugg-item.hi{background:var(--cream);}
.sugg-name{font-weight:500;}
.sugg-name mark{background:rgba(196,68,10,.14);color:var(--rust);border-radius:2px;padding:0 1px;font-style:normal;}
.sugg-cat{font-size:.71rem;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;}
/* result card */
.rc{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);animation:up .28s ease;}
.rc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:20px 22px 16px;border-bottom:1.5px solid var(--border);}
.rc-head h2{font-size:1.4rem;font-weight:700;}
.rc-head .sub{font-size:.74rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;}
.badge{font-size:.67rem;padding:4px 12px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.fresh{background:#D4EDDA;color:#155724;}.moderate{background:#FFF3CD;color:#856404;}.perishable{background:#F8D7DA;color:#721C24;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1.5px solid var(--border);}
.sc{padding:16px 18px;border-inline-end:1.5px solid var(--border);}
.sc:last-child{border-inline-end:none;}
.sc .sl{font-size:.63rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:4px;}
.sc .sv{font-size:1.35rem;font-weight:700;color:var(--ink);}
.sc .su{font-size:.71rem;color:var(--muted);font-family:'DM Mono',monospace;}
.sc .sna{font-size:.84rem;color:var(--muted);}
.ns{padding:16px 22px;}
.ns h3{font-size:.67rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:9px;font-family:'DM Mono',monospace;}
.nl{list-style:none;}
.nl li{padding:4px 0 4px 16px;font-size:.84rem;color:#4A4238;position:relative;line-height:1.5;}
body[dir=rtl] .nl li{padding:4px 16px 4px 0;}
.nl li::before{content:'—';position:absolute;inset-inline-start:0;color:var(--rust);}
.ff{padding:10px 22px;background:#F8F6F2;border-top:1.5px solid var(--border);font-size:.66rem;color:var(--muted);font-family:'DM Mono',monospace;}
/* recipe */
.fl{font-size:.74rem;font-weight:600;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-family:'DM Mono',monospace;}
.rni input{width:100%;padding:13px 16px;font-size:1rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;background:var(--card);color:var(--ink);outline:none;transition:border-color .2s;}
.rni input:focus{border-color:var(--rust);}
.rni{margin-bottom:18px;}
.il{margin-bottom:14px;}
.ir{display:grid;grid-template-columns:1fr 105px 38px;gap:7px;margin-bottom:7px;animation:up .2s ease;position:relative;}
.ir input{padding:10px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.875rem;background:var(--card);color:var(--ink);outline:none;transition:border-color .2s;}
.ir input:focus{border-color:var(--rust);}
.rb{background:none;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;color:var(--muted);font-size:1.1rem;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.rb:hover{border-color:var(--rust);color:var(--rust);}
.br{display:flex;gap:9px;margin-bottom:26px;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:7px;font-family:inherit;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid transparent;}
.bp{background:var(--rust);color:#fff;border-color:var(--rust);}
.bp:hover{background:#A83608;}
.bs{background:transparent;color:var(--ink);border-color:var(--border);}
.bs:hover{border-color:var(--ink);}
/* recipe result */
.rrc{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);animation:up .28s ease;}
.rrh{padding:18px 22px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:13px;}
.rrh .ri{font-size:1.7rem;}
.rrh h2{font-size:1.2rem;font-weight:700;}
.rrh p{font-size:.77rem;color:var(--muted);margin-top:2px;}
.lbx{margin-inline-start:auto;text-align:end;}
.lbx .lbl{font-size:.61rem;font-family:'DM Mono',monospace;text-transform:uppercase;color:var(--muted);letter-spacing:.7px;display:block;margin-bottom:2px;}
.lbx .lbn{font-size:.84rem;font-weight:600;color:var(--rust);}
.bi{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:9px;font-size:.84rem;}
.bi:last-child{border-bottom:none;}
.bi .bn{flex:1;}
.bi .bs2{font-family:'DM Mono',monospace;font-size:.74rem;color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dl{background:var(--rust);}
.do{background:var(--sage);}
/* manage */
.pt{display:flex;gap:9px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.ps{flex:1;min-width:170px;padding:10px 15px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.875rem;background:var(--card);outline:none;transition:border-color .2s;}
.ps:focus{border-color:var(--rust);}
.tw{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow);}
.tw table{width:100%;border-collapse:collapse;}
.tw th{text-align:start;padding:10px 13px;font-size:.67rem;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-family:'DM Mono',monospace;background:#F8F6F2;border-bottom:1.5px solid var(--border);font-weight:500;}
.tw td{padding:9px 13px;font-size:.84rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.tw tr:last-child td{border-bottom:none;}
.tw tr:hover td{background:var(--cream);}
.pac{display:flex;gap:5px;}
.pbe,.pbd{padding:4px 11px;border-radius:5px;font-size:.74rem;font-family:inherit;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;}
.pbe{background:transparent;color:var(--ink);border-color:var(--border);}
.pbe:hover{border-color:var(--ink);}
.pbd{background:transparent;color:#721C24;border-color:#F8D7DA;}
.pbd:hover{background:#F8D7DA;}
.vb{font-family:'DM Mono',monospace;font-size:.74rem;}
.vb.na{color:var(--muted);}
.sd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-inline-end:4px;}
.sf{background:var(--sage);}.sm{background:var(--amber);}.sp{background:var(--rust);}
/* form */
.pfc{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:24px 26px;box-shadow:var(--shadow);animation:up .22s ease;}
.pfc h3{font-size:1.1rem;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.cfb{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--muted);}
.pfg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.pf{display:flex;flex-direction:column;gap:4px;}
.pf label{font-size:.71rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;}
.pf input,.pf select{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.875rem;background:var(--card);color:var(--ink);outline:none;transition:border-color .2s;}
.pf input:focus,.pf select:focus{border-color:var(--rust);}
.pfc{margin-bottom:20px;}
.nir{display:flex;gap:7px;margin-bottom:6px;}
.nir input{flex:1;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.84rem;background:var(--card);color:var(--ink);outline:none;transition:border-color .2s;}
.nir input:focus{border-color:var(--rust);}
.nir button{padding:0 11px;border-radius:7px;border:1.5px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-size:1rem;transition:all .15s;}
.nir button:hover{border-color:var(--rust);color:var(--rust);}
/* empty */
.es{text-align:center;padding:44px 20px;color:var(--muted);}
.es .big{font-size:2.4rem;margin-bottom:11px;}
.es p{font-size:.88rem;line-height:1.6;}
/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:11px 22px;border-radius:30px;font-size:.84rem;font-weight:500;z-index:500;opacity:0;pointer-events:none;transition:opacity .3s;}
.toast.show{opacity:1;}
/* password overlay */
.pw-overlay{position:fixed;inset:0;background:rgba(26,22,18,.55);backdrop-filter:blur(4px);z-index:900;display:flex;align-items:center;justify-content:center;animation:up .22s ease;}
.pw-box{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:36px 32px;width:min(360px,90vw);box-shadow:0 8px 40px rgba(26,22,18,.18);text-align:center;}
.pw-icon{font-size:2.2rem;margin-bottom:12px;}
.pw-box h3{font-size:1.1rem;font-weight:700;margin-bottom:6px;}
.pw-box p{font-size:.8rem;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.pw-input-wrap{position:relative;margin-bottom:14px;}
.pw-input-wrap input{width:100%;padding:12px 44px 12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;background:var(--cream);color:var(--ink);outline:none;transition:border-color .2s;text-align:center;letter-spacing:3px;}
body.ltr .pw-input-wrap input{text-align:center;}
.pw-input-wrap input:focus{border-color:var(--rust);box-shadow:0 0 0 3px rgba(196,68,10,.08);}
.pw-input-wrap input.err{border-color:#dc3545;animation:shake .3s ease;}
.pw-eye{position:absolute;inset-inline-end:13px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:1rem;background:none;border:none;padding:0;}
.pw-err{font-size:.78rem;color:#dc3545;margin-bottom:12px;min-height:18px;}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@media(max-width:600px){
  header{padding:14px 16px;}
  .top-tabs{padding:0 16px;}
  main{padding:22px 12px 60px;}
  .sg{grid-template-columns:1fr 1fr;}
  .sc{padding:12px 13px;}
  .pfg{grid-template-columns:1fr;}
  .tw th:nth-child(3),.tw td:nth-child(3),.tw th:nth-child(4),.tw td:nth-child(4){display:none;}
}
</style>
</head>
<body dir="rtl">
<header>
  <span class="h-title">ShelfSafe</span>
  <span class="h-badge">FDA</span>
  <button class="lang-btn" id="lbtn" onclick="toggleLang()">English</button>
</header>
<div class="top-tabs">
  <button class="top-tab active" id="tab-single" onclick="switchTab('single')" data-ar="بحث عن منتج" data-en="Single Item">بحث عن منتج</button>
  <button class="top-tab" id="tab-recipe" onclick="switchTab('recipe')" data-ar="حساب وصفة" data-en="Recipe Builder">حساب وصفة</button>
  <button class="top-tab" id="tab-manage" onclick="switchTab('manage')" data-ar="إدارة المنتجات" data-en="Manage Products" style="display:none">إدارة المنتجات</button>
</div>
<main>
  <!-- SINGLE -->
  <div class="panel active" id="panel-single">
    <div class="sw">
      <input id="si" autocomplete="off"
        data-ar="ابحث عن منتج... مثل: حليب، دجاج، كريمة..."
        data-en="Search a food item... e.g. milk, chicken, cream..."
        placeholder="ابحث عن منتج... مثل: حليب، دجاج، كريمة..."
        oninput="doSearch(this.value,'ss')" onkeydown="searchKey(event,'ss','single')">
      <span class="sw-icon">🔎</span>
      <div class="sugg" id="ss" style="display:none"></div>
    </div>
    <div id="sr">
      <div class="es"><div class="big">🥡</div><p id="se">ابدأ بالبحث عن أي منتج غذائي لمعرفة مدة صلاحيته وطريقة تخزينه الصحيحة وفقاً لـ FDA</p></div>
    </div>
  </div>
  <!-- RECIPE -->
  <div class="panel" id="panel-recipe">
    <div class="rni"><div class="fl" id="rnl">اسم الوصفة</div>
      <input id="rn" data-ar="مثال: وصفة الدجاج بالكريمة" data-en="e.g. Chicken in Cream Sauce" placeholder="مثال: وصفة الدجاج بالكريمة">
    </div>
    <div class="fl" id="il">المكونات</div>
    <div class="il" id="ilist"></div>
    <div class="br">
      <button class="btn bs" id="bai" onclick="addRow()">+ أضف مكوناً</button>
      <button class="btn bp" id="bcalc" onclick="calcRecipe()">احسب الصلاحية</button>
    </div>
    <div id="rr"></div>
  </div>
  <!-- MANAGE -->
  <div class="panel" id="panel-manage">
    <div class="pt">
      <input class="ps" id="pmsi" data-ar="ابحث في قاعدة البيانات..." data-en="Search database..." placeholder="ابحث في قاعدة البيانات..." oninput="renderTable(this.value)">
      <button class="btn bp" id="badd" onclick="openAdd()">+ إضافة منتج</button>
      <button class="btn bs" id="bexp" onclick="exportDB()">تصدير JSON</button>
      <button class="btn bs" onclick="lockManage()" title="قفل الإدارة" style="padding:10px 14px;font-size:1rem;">🔒</button>
    </div>
    <div id="pfc" style="margin-bottom:18px;"></div>
    <div class="tw"><table><thead><tr>
      <th id="thn">المنتج</th><th id="thc">الفئة</th>
      <th id="thp">مخزن</th><th id="thf">ثلاجة</th><th id="thfz">فريزر</th>
      <th id="ths">مستوى</th><th id="tha">إجراءات</th>
    </tr></thead><tbody id="ptb"></tbody></table></div>
    <div id="pcount" style="font-size:.74rem;color:var(--muted);font-family:'DM Mono',monospace;"></div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
// ── TRANSLATIONS ──────────────────────────────────────────

  en:{pantry:'Pantry / Room Temp',fridge:'Refrigerator',freezer:'Freezer',

  notRec:'Not recommended',indef:'Indefinite',

// ── LANG TOGGLE ───────────────────────────────────────────
function toggleLang(){
  lang=lang==='ar'?'en':'ar';
  const isAr=lang==='ar';
  document.documentElement.lang=lang;
  document.documentElement.dir=isAr?'rtl':'ltr';
  document.body.dir=isAr?'rtl':'ltr';
  document.getElementById('lbtn').textContent=isAr?'English':'عربي';
  updateAllUI();
  const cur=document.getElementById('sr').dataset.current;
  if(cur) showResult(cur);
}

function updateAllUI(){
  document.querySelectorAll('.top-tab').forEach(el=>el.textContent=lang==='ar'?el.dataset.ar:el.dataset.en);
  document.querySelectorAll('[data-ar],[data-en]').forEach(el=>{
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') el.placeholder=lang==='ar'?(el.dataset.ar||el.placeholder):(el.dataset.en||el.placeholder);
  });
  const ids={rnl:'recipeNameLbl',il:'ingLbl',bai:'addIng',bcalc:'calcBtn',
    badd:'addProd',bexp:'exportBtn',se:'singleEmpty',
    thn:'thn',thc:'thc',thp:'thp',thf:'thf',thfz:'thfz',ths:'ths',tha:'tha'};
  Object.entries(ids).forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.textContent=t(k);});
  document.querySelectorAll('.ing-name-input').forEach(el=>el.placeholder=t('ingPh'));
  document.querySelectorAll('.ing-qty-input').forEach(el=>el.placeholder=t('qtyPh'));
  renderTable(document.getElementById('pmsi').value||'');
}

// ── HELPERS ───────────────────────────────────────────────
function fmtDays(days){
  if(days===null)return null;
  if(days>=99000)return{v:'∞',u:t('indef')};
  if(days>=365){const y=Math.round(days/365*10)/10;return{v:y,u:lang==='ar'?'سنة':(y===1?'year':'years')};}
  if(days>=30){const m=Math.round(days/30);return{v:m,u:lang==='ar'?'شهر':(m===1?'month':'months')};}
  return{v:days,u:lang==='ar'?'يوم':(days===1?'day':'days')};
}
function cellH(lk,icon,days){
  const f=days!==null?fmtDays(days):null;
  return`<div class="sc"><div class="sl"><span>${icon}</span>${t(lk)}</div>${f?`<div class="sv">${f.v}<span class="su"> ${f.u}</span></div>`:`<div class="sna">${t('notRec')}</div>`}</div>`;
}
function badge(s){
  const m={perishable:'perishable',moderate:'moderate',fresh:'fresh'};
  return`<span class="badge ${m[s]||'moderate'}">${t(s)}</span>`;
}
function getName(k){return lang==='en'&&DB[k]&&DB[k].nameEn?DB[k].nameEn:k;}
function searchDB(q){
  if(!q||q.length<1)return[];
  const lo=q.toLowerCase();
  return Object.keys(DB).filter(k=>k.toLowerCase().includes(lo)||(DB[k].nameEn||'').toLowerCase().includes(lo)||(DB[k].category||'').toLowerCase().includes(lo));
}
function hlMatch(text,q){
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i===-1)return text;
  return text.slice(0,i)+`<mark>${text.slice(i,i+q.length)}</mark>`+text.slice(i+q.length);
}
function resolveKey(raw){
  const lo=raw.toLowerCase().trim();
  if(DB[lo])return lo;
  const keys=Object.keys(DB);
  return keys.find(k=>k.toLowerCase()===lo||(DB[k].nameEn||'').toLowerCase()===lo)||
    keys.find(k=>k.toLowerCase().includes(lo)||lo.includes(k.toLowerCase())||(DB[k].nameEn||'').toLowerCase().includes(lo)||lo.includes((DB[k].nameEn||'').toLowerCase()))||null;
}

// ── AUTOCOMPLETE ─────────────────────────────────────────
let hiIdx=-1;
function doSearch(val,boxId){
  hiIdx=-1;
  const box=document.getElementById(boxId);
  const res=searchDB(val);
  if(!res.length||!val.trim()){box.style.display='none';return;}
  box.innerHTML=res.slice(0,10).map((k,i)=>{
    const n=getName(k);
    return`<div class="sugg-item" data-key="${k}" onmousedown="pickSug('${k}','${boxId}')"><span class="sugg-name">${hlMatch(n,val)}</span><span class="sugg-cat">${DB[k].category||''}</span></div>`;
  }).join('');
  box.style.display='block';
}
function searchKey(e,boxId,ctx){
  const box=document.getElementById(boxId);
  const items=box.querySelectorAll('.sugg-item');
  if(e.key==='ArrowDown'){hiIdx=Math.min(hiIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hi',i===hiIdx));e.preventDefault();}
  else if(e.key==='ArrowUp'){hiIdx=Math.max(hiIdx-1,0);items.forEach((el,i)=>el.classList.toggle('hi',i===hiIdx));e.preventDefault();}
  else if(e.key==='Enter'){
    if(hiIdx>=0&&items[hiIdx]){pickSug(items[hiIdx].dataset.key,boxId);}

    }
    box.style.display='none';
  }else if(e.key==='Escape'){box.style.display='none';}
}

function calcRecipe(){
  const rows=document.querySelectorAll('.ir');
  const ings=[];
  rows.forEach(r=>{
    const ni=r.querySelector('.ing-name-input');
    const qi=r.querySelector('.ing-qty-input');
    if(!ni||!ni.value.trim())return;
    const raw=ni.value.trim();
    const rk=ni.dataset.rk||resolveKey(raw);
    ings.push({raw,rk,data:rk?DB[rk]:null,qty:qi?.value||''});
  });
  const valid=ings.filter(i=>i.data);
  if(!valid.length){document.getElementById('rr').innerHTML=`<div class="es"><div class="big">🥘</div><p>${t('noIngs')}</p></div>`;return;}
  let mp=null,mf=null,mfz=null,lp='',lf='',lfz='',nullPantry=false;
  valid.forEach(i=>{
    const d=i.data;const n=i.rk?getName(i.rk):i.raw;
    if(d.pantry===null){nullPantry=true;if(!lp)lp=n;}
    else if(!nullPantry&&(mp===null||d.pantry<mp)){mp=d.pantry;lp=n;}
    if(d.fridge!==null&&(mf===null||d.fridge<mf)){mf=d.fridge;lf=n;}
    if(d.freezer!==null&&(mfz===null||d.freezer<mfz)){mfz=d.freezer;lfz=n;}
  });
  if(nullPantry)mp=null;
  const rname=document.getElementById('rn').value.trim()||(lang==='ar'?'وصفتك':'Your Recipe');
  const lim=lf||lp;
  const bdown=valid.map(i=>{
    const d=i.data;const n=i.rk?getName(i.rk):i.raw;
    const isLim=(d.fridge!==null&&d.fridge===mf)||(d.pantry!==null&&d.pantry===mp&&!nullPantry);
    const fd=d.fridge?fmtDays(d.fridge):null;
    const ss=fd?`${fd.v} ${fd.u} (${t('fridge')})`:(d.pantry?`${fmtDays(d.pantry).v} ${fmtDays(d.pantry).u}`:t('notRec'));
    return`<div class="bi"><div class="dot ${isLim?'dl':'do'}"></div><div class="bn">${n}${i.qty?` <span style="color:var(--muted);font-size:.77rem;">· ${i.qty}</span>`:''}</div><div class="bs2">${ss}</div></div>`;
  }).join('');
  const unk=ings.filter(i=>!i.data);
  const unkNote=unk.length?`<div style="padding:10px 22px;font-size:.79rem;color:var(--muted);background:#FFF8F0;border-top:1px solid var(--border);">⚠️ ${t('unknown')} ${unk.map(i=>i.raw).join(', ')} ${t('excluded')}</div>`:'';
  document.getElementById('rr').innerHTML=`<div class="rrc">
    <div class="rrh"><span class="ri">🍽️</span>
      <div><h2>${rname}</h2><p>${valid.length} ${t('recog')||t('recoznized')||t('recognized')} · ${t('estimate')}</p></div>
      <div class="lbx"><span class="lbl">${t('limitingFactor')}</span><span class="lbn">${lim||'—'}</span></div>
    </div>
    <div class="sg">${cellH('pantry','🏺',mp)}${cellH('fridge','❄️',mf)}${cellH('freezer','🧊',mfz)}</div>
    <div class="ns" style="border-bottom:1.5px solid var(--border);"><h3>${t('ingredients')||'المكونات'}</h3>${bdown}</div>
    ${unkNote}
    <div class="ns"><h3>${t('ruleTitle')}</h3><ul class="nl">${(t('rules')||[]).map(r=>`<li>${r}</li>`).join('')}</ul></div>
    <div class="ff">${t('fdaFooter')}</div>
  </div>`;
}

// ── SECURITY MODULE (IIFE — nothing leaks to window) ─────
const _sec = (function(){
  // ╔══════════════════════════════════════════════════════╗
  // ║  TO CHANGE PASSWORD:                                 ║
  // ║  1. Open browser console                            ║
  // ║  2. Run: _sec.setPass('your_new_password')          ║
  // ║  Password is stored as SHA-256 hash — never plain   ║
  // ╚══════════════════════════════════════════════════════╝

  // Default password hash (SHA-256) — plaintext never stored
  // Change via console: _sec.setPass('your_new_password')
  const DEFAULT_HASH = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9';
  const STORAGE_KEY  = '__ss_ph__';
  const ATTEMPT_KEY  = '__ss_fa__';
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_MS   = 5 * 60 * 1000; // 5 minutes
  const SESSION_MS   = 30 * 60 * 1000; // 30 min auto-lock

  let _unlocked   = false;
  let _sessionTimer = null;

  // ── Hash helper (async SHA-256) ────────────────────────
  async function sha256(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  // ── Stored hash ───────────────────────────────────────
  async function getStoredHash(){
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) return stored;
    // First run — store the pre-computed default hash
    localStorage.setItem(STORAGE_KEY, DEFAULT_HASH);
    return DEFAULT_HASH;
  }

  // ── Brute-force state ─────────────────────────────────
  function getAttemptState(){
    try{ return JSON.parse(localStorage.getItem(ATTEMPT_KEY))||{count:0,lockedUntil:0}; }
    catch(e){ return {count:0,lockedUntil:0}; }
  }
  function saveAttemptState(s){ localStorage.setItem(ATTEMPT_KEY, JSON.stringify(s)); }
  function resetAttempts(){ localStorage.removeItem(ATTEMPT_KEY); }

  function isLockedOut(){
    const s = getAttemptState();
    if(s.lockedUntil && Date.now() < s.lockedUntil) return s.lockedUntil;
    if(s.lockedUntil && Date.now() >= s.lockedUntil){ resetAttempts(); }
    return false;
  }
  function recordFailedAttempt(){
    const s = getAttemptState();
    s.count = (s.count||0) + 1;
    if(s.count >= MAX_ATTEMPTS){
      s.lockedUntil = Date.now() + LOCKOUT_MS;
      s.count = 0;
    }
    saveAttemptState(s);
    return s;
  }

  // ── Session timer ─────────────────────────────────────
  function startSessionTimer(){
    clearTimeout(_sessionTimer);
    _sessionTimer = setTimeout(()=>{
      if(_unlocked) _doLock(true);
    }, SESSION_MS);
  }
  function resetSessionTimer(){
    if(_unlocked) startSessionTimer();
  }

  // ── Lock / Unlock ─────────────────────────────────────
  function _doLock(expired=false){
    _unlocked = false;
    clearTimeout(_sessionTimer);
    document.getElementById('tab-manage').style.display='none';
    switchTabDirect('single');
    showToast(expired
      ? (lang==='ar'?'⏱️ انتهت الجلسة تلقائياً':'⏱️ Session expired')
      : (lang==='ar'?'🔒 تم قفل الإدارة':'🔒 Management locked'));
  }

  function _doUnlock(){
    _unlocked = true;
    resetAttempts();
    closePwOverlay();
    document.getElementById('tab-manage').style.display='';
    switchTabDirect('manage');
    showToast(lang==='ar'?'🔓 تم فتح الإدارة':'🔓 Access granted');
    startSessionTimer();
    // Reset session on any user activity inside manage
    document.addEventListener('click', resetSessionTimer, {passive:true});
    document.addEventListener('keydown', resetSessionTimer, {passive:true});
  }

  // ── Overlay ───────────────────────────────────────────
  function showPwOverlay(){
    if(document.getElementById('pw-overlay')) return;
    const isAr = lang==='ar';

    const lockUntil = isLockedOut();
    const lockedMsg = lockUntil
      ? `<div style="color:#dc3545;font-size:.82rem;margin-bottom:14px;">
          🚫 ${isAr?'الحساب مقفل مؤقتاً حتى:':'Locked until:'} ${new Date(lockUntil).toLocaleTimeString()}
         </div>` : '';

    const overlay = document.createElement('div');
    overlay.className='pw-overlay'; overlay.id='pw-overlay';
    overlay.innerHTML=`<div class="pw-box">
      <div class="pw-icon">🔐</div>
      <h3>${isAr?'منطقة محمية':'Protected Area'}</h3>
      <p>${isAr?'أدخل كلمة السر للمتابعة':'Enter the password to continue'}</p>
      ${lockedMsg}
      <div class="pw-input-wrap">
        <input type="password" id="pw-inp" placeholder="${isAr?'••••••••':'••••••••'}"
          ${lockUntil?'disabled':''} autocomplete="current-password"
          onkeydown="if(event.key==='Enter')_sec.checkPw()">
        <button class="pw-eye" onclick="_sec.toggleEye()" id="pw-eye-btn">👁️</button>
      </div>
      <div class="pw-err" id="pw-err"></div>
      <div id="pw-attempts-bar"></div>
      <button class="btn bp" style="width:100%" ${lockUntil?'disabled':''} onclick="_sec.checkPw()">
        ${isAr?'دخول':'Enter'}
      </button>
      <button class="btn bs" style="width:100%;margin-top:8px" onclick="_sec.closeOverlay()">
        ${isAr?'إلغاء':'Cancel'}
      </button>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e=>{ if(e.target===overlay) _sec.closeOverlay(); });
    setTimeout(()=>{ const i=document.getElementById('pw-inp'); if(i&&!lockUntil) i.focus(); }, 80);
  }

  function closePwOverlay(){
    const o=document.getElementById('pw-overlay');
    if(o){ o.style.opacity='0'; o.style.transition='opacity .2s'; setTimeout(()=>o.remove(),200); }
  }

  function toggleEye(){
    const inp=document.getElementById('pw-inp'); if(!inp)return;
    inp.type=inp.type==='password'?'text':'password';
    document.getElementById('pw-eye-btn').textContent=inp.type==='password'?'👁️':'🙈';
  }

  async function checkPw(){
    const lockUntil = isLockedOut();
    if(lockUntil){
      const errEl=document.getElementById('pw-err');
      if(errEl) errEl.textContent=lang==='ar'?`🚫 مقفل حتى ${new Date(lockUntil).toLocaleTimeString()}`:`🚫 Locked until ${new Date(lockUntil).toLocaleTimeString()}`;
      return;
    }
    const inp=document.getElementById('pw-inp'); if(!inp)return;
    const errEl=document.getElementById('pw-err');
    const entered=inp.value;
    inp.value='';

    const [enteredHash, storedHash] = await Promise.all([sha256(entered), getStoredHash()]);

    if(enteredHash === storedHash){
      _doUnlock();
    } else {
      const state = recordFailedAttempt();
      inp.classList.add('err');
      setTimeout(()=>inp.classList.remove('err'),400);

      const lockNow = isLockedOut();
      if(lockNow){
        if(errEl) errEl.textContent=lang==='ar'
          ?`🚫 تم قفل الحساب ${MAX_ATTEMPTS} محاولات خاطئة. انتظر 5 دقائق.`
          :`🚫 Locked after ${MAX_ATTEMPTS} failed attempts. Wait 5 minutes.`;
        const btn=document.querySelector('#pw-overlay .bp');
        if(btn) btn.disabled=true;
        const pwInp=document.getElementById('pw-inp');
        if(pwInp) pwInp.disabled=true;
      } else {
        const remaining = MAX_ATTEMPTS - (state.count||0);
        if(errEl) errEl.textContent=lang==='ar'
          ?`❌ كلمة سر خاطئة — ${remaining} محاولة متبقية`
          :`❌ Wrong password — ${remaining} attempt${remaining!==1?'s':''} left`;
        inp.focus();
      }
    }
  }

  // ── Guard function: all admin actions call this ────────
  function requireAuth(fn){
    return function(...args){
      if(!_unlocked){
        showToast(lang==='ar'?'🔒 تحتاج صلاحية الدخول':'🔒 Authentication required');
        return;
      }
      resetSessionTimer();
      return fn(...args);
    };
  }

  // ── Change password ────────────────────────────────────
  async function setPass(newPass){
    if(!_unlocked){ console.warn('Must be authenticated to change password.'); return; }
    if(!newPass||newPass.length<6){ console.warn('Password must be at least 6 characters.'); return; }
    const h = await sha256(newPass);
    localStorage.setItem(STORAGE_KEY, h);
    console.log('✅ Password updated successfully.');
  }

  // ── Keyboard shortcut ─────────────────────────────────
  document.addEventListener('keydown', e=>{
    if(e.ctrlKey && e.shiftKey && (e.key==='A'||e.key==='a')){
      e.preventDefault();
      if(_unlocked) switchTabDirect('manage');
      else showPwOverlay();
    }
    if(e.key==='Escape') closePwOverlay();
  });

  // ── Public API ─────────────────────────────────────────
  return {
    requestAccess : showPwOverlay,
    checkPw       : checkPw,
    closeOverlay  : closePwOverlay,
    toggleEye     : toggleEye,
    lock          : ()=>_doLock(false),
    setPass       : setPass,
    isAuth        : ()=>_unlocked,
    guard         : requireAuth,
  };
})();

// ── Guard wrappers: public names → authenticated private fns ─
// These are the ONLY callable versions of write operations.
// Even if called from DevTools console, _sec.isAuth() check fires.
const openAdd   = _sec.guard(_openAdd);
const openEdit  = _sec.guard(_openEdit);
const saveProd  = _sec.guard(_saveProd);
const delProd   = _sec.guard(_delProd);
const exportDB  = _sec.guard(_exportDB);
const lockManage= ()=>_sec.lock();

// INIT
updateAllUI();renderTable();
</script>
</body>
